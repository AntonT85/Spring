version: '3.9'
services:
  postgres:
    image: "postgres:latest"  # лучше указывать конкретную версию
    environment:
      POSTGRES_DB: "edupb"
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "admin"
      PGDATA: "/var/lib/postgresql/data/pgdata"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata  # именованный volume
    ports:
      - "5432:5432"

volumes:
  postgres_data:  # объявление volume